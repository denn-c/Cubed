<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="shortcut icon"
            href="asset/icons/favicon.png"
            type="image/x-icon" />
        <link rel="stylesheet" href="css/normalize.css" />
        <link rel="stylesheet" href="css/styles.css" />
        <title>Cubed</title>
    </head>
    <body>
        <header class="header">
            <button class="header__hamburger" aria-label="Toggle menu">
                <img
                    src="asset/icons/bars-solid.svg"
                    alt="Menu"
                    class="hamburger__icon" />
            </button>
            <nav class="header__nav">
                <ul class="nav__list">
                    <li class="list__item">
                        <a
                            href="#/bloquetas"
                            class="item__link item__link--selected"
                            data-link>
                            <img
                                src="asset/icons/brick.svg"
                                alt="Icono de ladrillo"
                                class="link__img" />
                            Bloquetas
                        </a>
                    </li>
                    <li class="list__item">
                        <a href="#/fierros" class="item__link" data-link>
                            <img
                                src="asset/icons/steel.svg"
                                alt="Icono de fierro"
                                class="link__img" />
                            Fierros
                        </a>
                    </li>
                    <li class="list__item">
                        <a href="#/agregado" class="item__link" data-link>
                            <img
                                src="asset/icons/gravel.svg"
                                alt="Icono de grava"
                                class="link__img" />
                            Agregado
                        </a>
                    </li>
                    <li class="list__item">
                        <a href="#/instalaciones" class="item__link" data-link>
                            <img
                                src="asset/icons/plumbing.svg"
                                alt="Icono de Accesorios"
                                class="link__img" />
                            Instalaciones
                        </a>
                    </li>
                </ul>
                <ul class="nav__list">
                    <li class="list__item">
                        <a href="" class="item__link">
                            <img
                                src="asset/icons/bell-solid.svg"
                                alt="Icono de notificaciones"
                                class="link__img" />
                        </a>
                    </li>
                    <li class="list__item">
                        <a href="" class="item__link">
                            <img
                                src="asset/icons/folder-solid.svg"
                                alt="Icono de carpeta"
                                class="link__img" />
                        </a>
                    </li>
                    <li class="list__item">
                        <a href="" class="item__link">
                            <img
                                src="asset/icons/gear-solid.svg"
                                alt="Icono de configuraciones"
                                class="link__img" />
                        </a>
                    </li>
                </ul>
            </nav>
        </header>
        <main id="content"></main>
        <script type="module" src="js/router.js"></script>
        <script type="module" src="js/main.js"></script>
    </body>
</html>
