<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" href="asset/icon/favicon.png" type="image/x-icon" />
  <link rel="stylesheet" href="css/normalize.css" />
  <link rel="stylesheet" href="css/styles.css" />
  <title>Cubed</title>
</head>

<body>
  <header class="header">
    <button class="header__hamburger" aria-label="Toggle menu">
      <img src="asset/icon/bars-solid.svg" alt="" class="hamburger__icon" />
    </button>
    <nav class="header__nav">
      <a href="index.html" class="nav__logo">
        <img src="asset/icon/logo.svg" alt="logo de la aplicación" class="logo__img" />
        <h1 class="logo__title">Cubed</h1>
      </a>
      <ul class="nav__list">
        <li class="list__item">
          <a href="" class="item__link item__link--selected"><img src="asset/icon/brick.svg" alt="Icono de ladrillo"
              class="link__img" />Bloquetas</a>
        </li>
        <li class="list__item">
          <a href="" class="item__link"><img src="asset/icon/steel.svg" alt="Icono de fierro"
              class="link__img" />Fierros</a>
        </li>
        <li class="list__item">
          <a href="" class="item__link"><img src="asset/icon/gravel.svg" alt="Icono de grava"
              class="link__img" />Agregado</a>
        </li>
        <li class="list__item">
          <a href="" class="item__link"><img src="asset/icon/plumbing.svg" alt="Icono de Accesorios"
              class="link__img" />Accesorios</a>
        </li>
      </ul>
      <ul class="nav__list">
        <li class="list__item">
          <a href="" class="item__link"><img src="asset/icon/bell-solid.svg" alt="Icono de notificaciones"
              class="link__img" /></a>
        </li>
        <li class="list__item">
          <a href="" class="item__link"><img src="asset/icon/folder-solid.svg" alt="Icono de carpeta"
              class="link__img" /></a>
        </li>
        <li class="list__item">
          <a href="" class="item__link"><img src="asset/icon/gear-solid.svg" alt="Icono de configuraciones"
              class="link__img" /></a>
        </li>
      </ul>
    </nav>
  </header>
  <section class="block">
    <div class="block__graphic">
      <div class="graphic__name">
        <h2 class="name__title">
          Bloqueta
        </h2>
        <ul class="name__list">
          <li class="list__text list__text--selected">
            Bloqueta
          </li>
          <li class="list__text">King Kong</li>
          <li class="list__text">Bloquer</li>
          <li class="list__text">King Kong 18 huecos</li>
          <li class="list__text">Pandereta</li>
        </ul>
      </div>
      <picture class="graphic__picture">
        <source media="(min-width: 400px)" srcset="asset/images/desktop/bloqueta.png" id="image-desktop" />
        <img src="asset/images/mobile/bloqueta.png" alt="Imagen de bloqueta" id="image-mobile" />
      </picture>
    </div>
    <form action="#" class="block__form">
      <fieldset class="form__size">
        <legend class="size__title">Tamaño (CM)</legend>
        <div class="size__input">
          <label for="long" class="input__name">Largo</label>
          <input type="number" id="long" class="input__input" value="40" disabled />
        </div>
        <div class="size__input">
          <label for="high" class="input__name">Alto</label>
          <input type="number" id="high" class="input__input" value="20" disabled />
        </div>
        <div class="size__input">
          <label for="width" class="input__name">Ancho</label>
          <input type="number" id="width" class="input__input" value="12" disabled />
        </div>
        <button type="button" class="size__submit" id="edit_button">
          Editar
        </button>
      </fieldset>
    </form>
  </section>

  <script src="js/app.js"></script>
</body>

</html>
